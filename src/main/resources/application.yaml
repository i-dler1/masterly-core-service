server:
  port: 8081

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/masterly_db
    username: masterly_user
    password: masterly_password

  jpa:
    hibernate:
      ddl-auto: validate
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    show-sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

jwt:
  secret: your-secret-key-for-jwt-token-change-in-production
  expiration: 86400000